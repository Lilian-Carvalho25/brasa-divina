<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brasa Divina - Cadastro</title>
    <link rel="shortcut icon" href="../static/img/icon-brasa.svg" type="image/x-icon">
    <link rel="stylesheet" href="../static/css/style.css">
</head>

<body>
    <header>

        <div class="limitador">
            <a href="{{ url_for('main.home') }}"><img src="../static/img/Logo-brasa_divina.svg" alt="Logo brasa divina" class="logo"></a>
            <nav>
                <h2><a href="" class="icone"> <img src="../static/img/icon-menu.svg" alt=""> </a></h2>
                <ul class="menu">
                    <li><a href="{{ url_for('main.home') }}">Home</a></li>
                    <li><a href="{{ url_for('main.sobre') }}" class="special2">Sobre nós</a></li>
                    <li><a href="{{ url_for('main.monte_sua_pizza') }}" class="special">Monte sua pizza</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section id="container-register">
            <div class="register-page">
                <h1>Seja bem vindo(a)!</h1>
                <form action="{{ url_for('main.cadastro') }}" method="POST">
                    <div class="alignment-inputs">
                        <label for="name">Nome:</label>
                        <input type="text" name="nome" id="name-register" required>
                    </div>
                    <div class="email-and-password">
                        <div class="alignment-inputs">
                            <label for="email">E-mail:</label>
                            <input type="email" name="email" id="email-register" required>
                        </div>
                        <div class="alignment-inputs">
                            <label for="senha">Senha:</label>
                            <input type="password" name="senha" id="senha-register" required>
                        </div>
                    </div>
                    <div class="cep-and-cmp">
                        <div class="alignment-inputs">
                            <label for="cep">CEP:</label>
                            <input type="text" name="cep" id="cep-register">
                        </div>
                        <div class="alignment-inputs">
                            <label for="complemento">Complemento:</label>
                            <input type="text" name="complemento" id="complemento-register">
                        </div>
                    </div>
                    <button type="submit" name="button-register" class="login-register">Cadastrar</button>
                    <a href="#">Já tem cadastro? Faça login agora mesmo!</a>
                                                {% with messages = get_flashed_messages(with_categories=true) %}
                                                    {% if messages %}
                                                        {% for category, message in messages %}
                                                            <div class="alert alert-{{ category }}">{{ message }}</div>
                                                        {% endfor %}
                                                    {% endif %}
                                                {% endwith %}
                </form>
            </div>
        </section>
    </main>
</body>

<script src="../static/js/menu.js"></script>

</html>
